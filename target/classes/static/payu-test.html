<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payment Form</title>
<style>
body {
	margin: 0;
	font-family: Arial, sans-serif;
	background: linear-gradient(135deg, #667eea, #764ba2);
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
}

#paymentForm {
	background: #fff;
	padding: 30px;
	width: 320px;
	border-radius: 15px;
	box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
	text-align: center;
}

#paymentForm h2 {
	margin-bottom: 20px;
	color: #333;
}

#paymentForm input {
	width: 100%;
	padding: 12px;
	margin: 8px 0;
	border: 1px solid #ddd;
	border-radius: 8px;
	outline: none;
	transition: 0.3s;
}

#paymentForm input:focus {
	border-color: #667eea;
	box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
}

#paymentForm button {
	width: 100%;
	padding: 12px;
	margin-top: 10px;
	background: linear-gradient(135deg, #667eea, #764ba2);
	border: none;
	color: white;
	font-size: 16px;
	border-radius: 8px;
	cursor: pointer;
	transition: 0.3s;
}

#paymentForm button:hover {
	transform: translateY(-2px);
	box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
}
</style>
</head>
<body>

	
	<form id="paymentForm">
	<h2>PayU Payment Test</h2>
	
		<input type="text" id="name" placeholder="Name"><br>
		<br> <input type="email" id="email" placeholder="Email"><br>
		<br> <input type="text" id="phone" placeholder="Phone"><br>
		<br> <input type="number" id="amount" placeholder="Amount"><br>
		<br>
		<button type="button" onclick="payNow()">Pay Now</button>
	</form>

	<script>
function payNow() {

    const payload = {
        firstName: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        amount: document.getElementById("amount").value,
        productInfo: "Test Product"
    };

    fetch("http://localhost:8081/payu/create-payment", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {

        // Create form dynamically
        const form = document.createElement("form");
        form.method = "POST";
        form.action = data.payuUrl;

        for (let key in data) {
            if (key !== "payuUrl") {
                const input = document.createElement("input");
                input.type = "hidden";
                input.name = key;
                input.value = data[key];
                form.appendChild(input);
            }
        }

        document.body.appendChild(form);
        form.submit();
    });
}
</script>

</body>
</html>
